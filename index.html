<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prode Mundial 2026 — Fixture, Sedes, Planteles, Historia + 5 IAs</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='52'%3E%E2%9A%BD%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://flagcdn.com">
<style>
:root{
  --celeste:#75AADB; --celeste-2:#4A90C2; --celeste-3:#a8cae8;
  --sol:#F6B40E; --sol-2:#FCBF49; --sol-soft:#fde68a;
  --navy:#0B2545; --navy-2:#13294B; --navy-3:#1a3460;
  --ink:#1e293b; --muted:#64748b; --line:#e2e8f0;
  --card:#ffffff; --bg-soft:#f1f5f9;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;background:#08172b;color:var(--ink);-webkit-font-smoothing:antialiased;}
header{position:relative;background:radial-gradient(ellipse at 50% -20%,#3d7fb8 0%,#1f4d82 30%,#0c2a4d 60%,#08172b 100%);color:#fff;text-align:center;overflow:hidden;}
header::before{content:"";position:absolute;inset:0;background-image:radial-gradient(circle at 20% 30%,rgba(246,180,14,.08) 0,transparent 40%),radial-gradient(circle at 80% 70%,rgba(117,170,219,.12) 0,transparent 45%);pointer-events:none;}
header::after{content:"";position:absolute;left:0;right:0;bottom:0;height:6px;background:linear-gradient(90deg,var(--celeste) 0%,#fff 33%,var(--sol) 50%,#fff 67%,var(--celeste) 100%);}
.hero{position:relative;min-height:88vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:48px 20px 60px;}
.hero .trophy{font-size:128px;line-height:1;filter:drop-shadow(0 14px 30px rgba(246,180,14,.35)) drop-shadow(0 0 24px rgba(117,170,219,.25));animation:float 3.4s ease-in-out infinite;}
.hero h1{margin:14px 0 0;font-size:clamp(40px,9vw,88px);font-weight:900;letter-spacing:1.5px;background:linear-gradient(180deg,#fff 0%,var(--celeste-3) 55%,var(--celeste) 100%);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 4px 40px rgba(117,170,219,.35);line-height:1;}
.hero .sub{margin:14px 0 0;color:var(--sol-soft);font-size:clamp(14px,2.4vw,20px);font-weight:800;letter-spacing:4px;text-transform:uppercase;}
.hero .sub2{margin:14px auto 0;color:#bfd6ed;font-size:14px;max-width:560px;line-height:1.5;}
.hero .badges{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:28px 0 0;}
.hero .badge{background:rgba(255,255,255,.08);backdrop-filter:blur(8px);border:1px solid rgba(117,170,219,.35);border-radius:14px;padding:10px 16px;color:#fff;display:flex;flex-direction:column;align-items:center;min-width:96px;transition:.2s;}
.hero .badge:hover{background:rgba(246,180,14,.12);border-color:var(--sol);transform:translateY(-2px);}
.hero .badge b{font-size:24px;font-weight:900;color:var(--sol-2);line-height:1;}
.hero .badge span{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#cfe2f5;margin-top:4px;font-weight:600;}
.countdown{display:flex;gap:8px;justify-content:center;margin:30px 0 0;flex-wrap:wrap;}
.cd-box{background:linear-gradient(180deg,rgba(11,37,69,.7) 0%,rgba(11,37,69,.5) 100%);border:1px solid rgba(117,170,219,.4);border-radius:12px;padding:14px 8px 10px;min-width:78px;box-shadow:0 8px 24px rgba(0,0,0,.3);}
.cd-box b{display:block;font-size:34px;font-weight:900;color:#fff;line-height:1;font-variant-numeric:tabular-nums;text-shadow:0 2px 12px rgba(117,170,219,.5);}
.cd-box span{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--celeste-3);margin-top:6px;font-weight:700;}
.cd-label{color:var(--sol-2);font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:2px;margin:24px 0 -4px;}
.cd-live{color:#ef4444;font-weight:900;animation:blink 1.3s infinite;}
.hero .scroll{margin-top:34px;color:#9fb0c9;font-size:13px;font-weight:700;animation:bounce 1.8s infinite;letter-spacing:1px;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(246,180,14,.5)}70%{box-shadow:0 0 0 10px rgba(246,180,14,0)}}
.wrap{max-width:1180px;margin:0 auto;padding:0 14px 60px;}
.tabs{display:none;}
.panel{background:#f8fafc;border-radius:14px;padding:24px 20px;display:none;margin-top:18px;box-shadow:0 4px 30px rgba(0,0,0,.08);animation:fadeIn .35s;}
.panel.active{display:block;}
.panel#panel-INICIO{padding:0;background:transparent;box-shadow:none;}
.backbar{display:flex;align-items:center;gap:10px;margin:-8px -4px 16px;position:sticky;top:0;background:rgba(248,250,252,.96);backdrop-filter:blur(8px);padding:10px 6px;border-bottom:1px solid var(--line);z-index:40;border-radius:10px 10px 0 0;}
.back-btn{background:#fff;border:1px solid var(--line);color:var(--navy);padding:8px 14px;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.18s;font-family:inherit;}
.back-btn:hover{background:var(--celeste);color:#fff;border-color:var(--celeste);transform:translateX(-2px);box-shadow:0 4px 12px rgba(117,170,219,.35);}
.backbar .crumb{font-size:13px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.backbar .crumb b{color:var(--navy);}
.champbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 18px;border-radius:12px;color:#fff;margin-bottom:16px;}
.champbar .crown{font-size:30px;}
.champbar b{font-size:22px;}
.champbar span{font-size:13px;opacity:.92;}
.subtabs{display:flex;gap:8px;margin-bottom:16px;}
.subtab{padding:8px 18px;border-radius:9px;background:#e2e8f0;color:#475569;cursor:pointer;font-weight:600;font-size:14px;border:none;}
.subtab.active{background:var(--ink);color:#fff;}
.sub{display:none;}
.sub.active{display:block;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(330px,100%),1fr));gap:14px;}
.gcard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
.gcard h4{margin:0 0 8px;font-size:15px;display:flex;align-items:center;gap:8px;}
.gcard h4 .gl{background:var(--ink);color:#fff;border-radius:6px;padding:2px 9px;font-size:13px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
.stand td,.stand th{padding:4px 6px;text-align:left;border-bottom:1px solid #f1f5f9;}
.stand th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;}
.stand .p1{background:#dcfce7;}.stand .p2{background:#dcfce7;}
.stand .p3{background:#fef9c3;}.stand .p4{background:#fee2e2;}
.stand td.c{text-align:center;width:34px;}
.mtable{margin-top:9px;font-size:12.5px;}
.mtable .row{display:grid;grid-template-columns:1fr 58px 1fr;align-items:center;padding:4px 2px;border-bottom:1px dashed #eef2f7;}
.mtable .row .h{text-align:right;}
.mtable .row .a{text-align:left;}
.mtable .sc{text-align:center;font-weight:800;color:var(--ink);background:#f1f5f9;border-radius:5px;padding:1px 0;}
.banner{background:#16784b;color:#fff;padding:10px 16px;border-radius:10px;margin:18px 0;font-size:14px;}
.banner b{color:#bbf7d0;}
.ko h3{margin:20px 0 8px;font-size:17px;border-left:4px solid var(--ink);padding-left:10px;}
.kotable{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.kotable table{font-size:13.5px;}
.kotable td{padding:7px 10px;border-bottom:1px solid #f1f5f9;}
.kotable .num{color:var(--muted);width:38px;text-align:center;font-size:12px;}
.kotable .home{text-align:right;width:40%;}
.kotable .away{text-align:left;width:40%;}
.kotable .sc{text-align:center;font-weight:800;white-space:nowrap;}
.kotable .win{font-weight:800;}
.final-row td{background:#fffbeb;font-size:15px;}
.awards{background:#fff;border:1px solid var(--line);border-radius:12px;padding:6px 16px;margin-top:18px;}
.awards .a{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid #f1f5f9;}
.awards .a:last-child{border-bottom:none;}
.awards .k{color:var(--muted);font-weight:600;}.awards .v{font-weight:700;text-align:right;}
.exp{background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px 22px 18px;line-height:1.6;}
.exp h3{color:var(--ink);margin:18px 0 6px;font-size:16px;}
.exp p{margin:6px 0;color:#334155;font-size:14px;}
.exp ol,.exp li{font-size:14px;color:#334155;}
.note{text-align:center;color:#64748b;font-size:12px;margin-top:24px;}
.donate{max-width:560px;margin:40px auto 0;background:#fff;border:1px solid var(--line);border-radius:16px;padding:28px 24px;text-align:center;box-shadow:0 10px 28px rgba(0,0,0,.10);}
.donate-emoji{font-size:50px;line-height:1;}
.donate h3{margin:8px 0 4px;font-size:22px;color:var(--ink);}
.donate p{margin:0 auto 18px;color:#64748b;font-size:15px;max-width:430px;line-height:1.5;}
.donate-btn{display:inline-flex;align-items:center;gap:8px;background:#009ee3;color:#fff;font-weight:800;font-size:16px;text-decoration:none;padding:13px 28px;border-radius:30px;box-shadow:0 6px 16px rgba(0,158,227,.35);transition:.15s;}
.donate-btn:hover{background:#0089c7;transform:translateY(-2px);}
.pb-actions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.pb-btn{background:#0ea5e9;color:#fff;border:none;border-radius:9px;padding:9px 16px;font-weight:700;font-size:14px;cursor:pointer;}
.pb-btn:hover{filter:brightness(.95);}
.pb-btn.alt{background:#475569;}
.pb-btn.ghost{background:#fff;color:#475569;border:1px solid var(--line);}
.prode-toolbar{position:sticky;top:52px;z-index:35;display:flex;align-items:center;justify-content:space-between;gap:14px;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border:1px solid #dbeafe;border-radius:14px;padding:12px 14px;margin:0 0 16px;box-shadow:0 12px 26px rgba(15,23,42,.08);}
.prode-status{display:flex;align-items:center;gap:10px;min-width:190px;}
.prode-status .status-dot{width:12px;height:12px;border-radius:999px;background:#94a3b8;box-shadow:0 0 0 4px rgba(148,163,184,.14);flex:0 0 auto;}
.prode-status b{display:block;color:var(--navy);font-size:14px;}
.prode-status b[data-tone="saving"]+.status-sub,.prode-status b[data-tone="idle"]+.status-sub{color:#64748b;}
.prode-status b[data-tone="ok"]{color:#047857;}
.prode-status b[data-tone="err"]{color:#b91c1c;}
.status-sub{display:block;color:#64748b;font-size:12px;margin-top:1px;}
.prode-status[data-tone="ok"] .status-dot{background:#22c55e;box-shadow:0 0 0 4px rgba(34,197,94,.14);}
.prode-status[data-tone="saving"] .status-dot{background:#0ea5e9;box-shadow:0 0 0 4px rgba(14,165,233,.16);}
.prode-status[data-tone="err"] .status-dot{background:#ef4444;box-shadow:0 0 0 4px rgba(239,68,68,.15);}
.prode-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap;}
.prode-actions .pb-btn{margin:0;min-height:40px;}
.prode-layout{display:block;}
.prode-main{min-width:0;}
.auth-box{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.auth-box .auth-title{font-weight:900;color:var(--navy);font-size:14px;}
.auth-box .auth-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.auth-box .auth-form{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.auth-box input{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;min-width:130px;}
.account-widget{position:fixed;top:14px;right:14px;z-index:90;}
.account-btn{width:46px;height:46px;border-radius:999px;border:1px solid rgba(255,255,255,.55);background:linear-gradient(135deg,#f8fafc,#dbeafe);color:var(--navy);box-shadow:0 10px 28px rgba(0,0,0,.24);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;cursor:pointer;font-family:inherit;}
.account-btn.logged{background:linear-gradient(135deg,var(--sol),#fde68a);border-color:#fff;}
.account-pop{position:absolute;right:0;top:56px;width:min(360px,calc(100vw - 28px));display:none;}
.account-pop.open{display:block;}
.account-pop .auth-box{box-shadow:0 18px 45px rgba(8,23,43,.28);margin:0;}
.my-groups{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px;}
.my-groups h3{margin:0 0 10px;font-size:16px;color:var(--navy);}
.my-group-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(280px,100%),1fr));gap:10px;}
.my-group-card{border:1px solid var(--line);border-radius:10px;padding:11px 12px;background:#f8fafc;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.my-group-name{font-weight:900;color:var(--navy);margin-bottom:3px;}
.my-group-meta{color:var(--muted);font-size:12px;}
.my-group-empty{color:var(--muted);font-size:13px;background:#f8fafc;border:1px dashed var(--line);border-radius:10px;padding:12px;}
.pb-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:16px;}
.pb-card h3{margin:0 0 12px;font-size:16px;}
.pb-card-groups{padding:18px;background:linear-gradient(180deg,#fff 0%,#f8fbff 100%);}
.pb-card-groups .pb-help{color:#64748b;font-size:13px;margin:0 0 14px;line-height:1.45;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.pb-legend{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;background:#f8fafc;border:1px solid #e2e8f0;color:#475569;font-size:12px;font-weight:800;}
.pb-dot{width:8px;height:8px;border-radius:999px;display:inline-block;background:#22c55e;}
.pb-dot.third{background:#eab308;}
.pb-defs{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(220px,100%),1fr));gap:12px;}
.pb-field{display:flex;flex-direction:column;gap:4px;font-size:13px;font-weight:600;color:#475569;}
.pb-field select,.pb-field input{padding:8px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;}
.pb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(250px,100%),1fr));gap:12px;}
.pb-g{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
.pb-g h4{margin:0 0 8px;display:flex;align-items:center;gap:8px;font-size:15px;}
.pb-g .gl{background:#0ea5e9;color:#fff;border-radius:6px;padding:2px 9px;font-size:13px;}
.pb-g .ln{display:grid;grid-template-columns:26px 1fr;align-items:center;gap:6px;margin:5px 0;}
.pb-g .pos{font-weight:800;color:#0ea5e9;font-size:13px;}
.pb-g select{padding:6px;border:1px solid var(--line);border-radius:7px;font-size:13px;width:100%;font-family:inherit;background:#fff;}
.pb-summary{background:#0f172a;color:#e2e8f0;border-radius:12px;padding:16px 18px;margin-top:8px;}
.pb-summary h3{margin:0 0 10px;color:#fbbf24;font-size:17px;}
.pb-summary .row{padding:3px 0;font-size:14px;}
.pb-toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#16784b;color:#fff;padding:11px 20px;border-radius:10px;font-weight:700;opacity:0;transition:.3s;pointer-events:none;z-index:99;}
.pb-toast.show{opacity:1;}
.pb-tc{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;}
.pb-tk{display:flex;align-items:center;gap:6px;font-size:13px;background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:6px 8px;cursor:pointer;}
.pb-tk.off{opacity:.55;}
.pb-tcount{margin-top:8px;font-size:14px;font-weight:700;}
#pb-bracket{overflow-x:auto;text-align:center;}
.bk-rounds{display:inline-flex;gap:14px;padding-bottom:10px;align-items:stretch;text-align:left;}
.bk-round{min-width:210px;flex:0 0 auto;display:flex;flex-direction:column;}
.bk-ms{flex:1;display:flex;flex-direction:column;justify-content:center;gap:2px;}
.bk-team{white-space:normal;}
.bk-h{font-weight:800;color:#0ea5e9;font-size:12px;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
.bk-m{background:#fff;border:1px solid var(--line);border-radius:10px;padding:6px;margin-bottom:10px;}
.bk-vs{display:block;text-align:center;font-size:10px;color:#94a3b8;margin:2px 0;}
.bk-team{display:block;width:100%;text-align:left;background:#f8fafc;border:1px solid var(--line);border-radius:7px;padding:6px 8px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--ink);}
.bk-team:hover:not(:disabled){background:#e0f2fe;}
.bk-team.sel{background:#0ea5e9;color:#fff;border-color:#0ea5e9;font-weight:800;}
.bk-team:disabled{color:#cbd5e1;cursor:default;}
.bk-team .fl{width:18px;height:13px;}
.bk-champ{text-align:center;font-size:20px;font-weight:900;padding:14px;margin-top:6px;background:#fffbeb;border-radius:12px;}
#pb-groups{grid-template-columns:repeat(auto-fill,minmax(min(390px,100%),1fr));gap:14px;align-items:start;}
#pb-groups .pb-g{padding:0;overflow:hidden;border-color:#d8e2ef;box-shadow:0 10px 24px rgba(15,23,42,.05);}
#pb-groups .pb-g h4{margin:0;padding:12px 14px;background:linear-gradient(180deg,#f8fbff 0%,#eef7ff 100%);border-bottom:1px solid #dbeafe;justify-content:space-between;gap:10px;}
#pb-groups .pb-g h4 .g-title{display:flex;align-items:center;gap:8px;min-width:0;}
#pb-groups .pb-g h4 .g-start{font-size:11px;font-weight:900;color:#2563eb;background:#fff;border:1px solid #bfdbfe;border-radius:999px;padding:4px 8px;white-space:nowrap;}
.gm-list{padding:8px 12px 4px;}
.gm{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #eef2f7;}
.gm:last-child{border-bottom:none;}
.gm .gm-t{min-width:0;font-size:13px;font-weight:750;display:flex;align-items:center;gap:6px;line-height:1.2;color:#1e293b;}
.gm .gm-t.r{justify-content:flex-end;text-align:right;}
.gm .gm-t .fl{flex:0 0 auto;}
.gm-score{display:flex;align-items:center;gap:4px;padding:3px;border:1px solid #dbeafe;background:#f8fbff;border-radius:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.75);}
.gm-sep{font-size:13px;color:#94a3b8;font-weight:900;padding:0 1px;}
.gm-day{display:flex;align-items:center;gap:8px;margin:12px 0 2px;font-size:11px;font-weight:900;color:#334155;text-transform:uppercase;letter-spacing:.35px;}
.gm-day::after{content:"";height:1px;background:#e2e8f0;flex:1;}
.stp{display:inline-flex;align-items:center;border:1px solid #dbeafe;border-radius:9px;overflow:hidden;background:#fff;}
.stp.locked{background:#f8fafc;border-color:#e2e8f0;}
.st-b{border:none;background:#eff6ff;color:#0284c7;font-weight:900;font-size:16px;width:30px;height:32px;cursor:pointer;line-height:1;touch-action:manipulation;}
.st-b:hover{background:#dbeafe;}
.st-b:focus-visible{outline:3px solid rgba(14,165,233,.35);outline-offset:2px;position:relative;z-index:1;}
.st-b:disabled{color:#94a3b8;background:#f1f5f9;cursor:not-allowed;}
.st-v{min-width:28px;text-align:center;font-weight:900;font-size:15px;color:#0f172a;font-variant-numeric:tabular-nums;}
.gstand{margin:8px 12px 12px;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;background:#fff;}
.gstand table{width:100%;border-collapse:collapse;font-size:12px;}
.gstand td,.gstand th{padding:5px 7px;border-bottom:1px solid #eef2f7;text-align:center;font-variant-numeric:tabular-nums;}
.gstand tr:last-child td{border-bottom:none;}
.gstand th{color:#64748b;background:#f8fafc;font-size:10px;text-transform:uppercase;font-weight:900;}
.gstand td.tn{text-align:left;font-weight:750;}
.gstand tr.q td{background:#dcfce7;}
.gstand tr.q td:first-child{box-shadow:inset 3px 0 #22c55e;}
.gstand tr.q3 td{background:#fef9c3;}
.gstand tr.q3 td:first-child{box-shadow:inset 3px 0 #eab308;}
@media(max-width:520px){
  .pb-card-groups{padding:14px 12px;}
  #pb-groups{grid-template-columns:1fr;}

.gr-sub{color:#64748b;font-size:13px;}

.gr-mini.del{background:#fee2e2;color:#991b1b;}
.gr-owner{display:inline-flex;align-items:center;gap:5px;margin-left:6px;background:#fffbeb;color:#92400e;border:1px solid #fde68a;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:900;vertical-align:middle;}
.gr-legacy{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;margin-bottom:14px;color:#92400e;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.gr-prode-table{width:100%;border-collapse:collapse;font-size:13px;}
.gr-prode-table th,.gr-prode-table td{padding:7px 8px;border-bottom:1px solid var(--line);text-align:left;}
.gr-prode-table th{color:var(--muted);font-size:11px;text-transform:uppercase;}
.gr-prode-groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(300px,100%),1fr));gap:12px;}
.gr-prode-group{border:1px solid var(--line);border-radius:12px;background:#fff;overflow:hidden;}
.gr-prode-gh{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#f8fafc;border-bottom:1px solid var(--line);padding:9px 11px;font-weight:900;color:var(--navy);font-size:13px;}
.gr-match-row{display:grid;grid-template-columns:minmax(0,1fr) 54px minmax(0,1fr);gap:6px;align-items:center;padding:7px 10px;border-bottom:1px dashed #eef2f7;font-size:12px;}
.gr-match-row:last-child{border-bottom:none;}
.gr-match-team{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:650;}
.gr-match-team.r{text-align:right;}
.gr-score{display:inline-flex;align-items:center;justify-content:center;min-height:28px;border-radius:8px;background:#0f172a;color:#fff;font-weight:900;font-variant-numeric:tabular-nums;}
.gr-score.empty{background:#f1f5f9;color:#94a3b8;}
#gr-code,#gr-newname,#gr-newplayer{padding:9px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;}
.fl{width:24px;height:18px;border-radius:2px;vertical-align:middle;margin-right:6px;box-shadow:0 0 1px rgba(0,0,0,.5);object-fit:cover;}
.kotable .away .fl{margin-right:6px;}
.printonly{display:none;}
.live-meta{text-align:right;color:#94a3b8;font-size:12px;margin:-6px 2px 10px;}
.lrefresh{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.55);border-radius:8px;padding:6px 12px;font-weight:700;cursor:pointer;font-size:13px;}
.lrefresh:hover{background:rgba(255,255,255,.32);}
.live-sec{margin:20px 0 8px;font-size:16px;font-weight:800;border-left:4px solid #ef4444;padding-left:10px;}
.live-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(300px,100%),1fr));gap:12px;}
.lmatch{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
.lround{color:#94a3b8;font-size:11px;margin-bottom:6px;}
.lmatch .lr{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;}
.lmatch .lt{display:flex;align-items:center;gap:4px;font-weight:600;font-size:14px;}
.lmatch .lt.r{justify-content:flex-end;text-align:right;}
.lmatch .lsc{font-size:22px;font-weight:900;text-align:center;min-width:60px;}
.lbadge{display:inline-block;font-size:11px;font-weight:800;padding:2px 9px;border-radius:20px;}
.badge-live{background:#fee2e2;color:#dc2626;animation:blink 1.3s infinite;}
.badge-ft{background:#e2e8f0;color:#475569;}
.badge-ns{background:#dbeafe;color:#1d4ed8;}
.live-empty{background:#fff;border:1px dashed var(--line);border-radius:12px;padding:44px 20px;text-align:center;color:#64748b;font-size:15px;}
@keyframes blink{50%{opacity:.45}}
@media(max-width:600px){.kotable .home,.kotable .away{font-size:12px;}}

/* ===== INICIO ===== */
.home-hero{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;margin-bottom:20px;}
.home-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px;position:relative;overflow:hidden;}
.home-card.dark{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);color:#fff;border:none;}
.home-card.dark .hc-title{color:var(--sol-2);}
.hc-title{font-size:13px;font-weight:800;color:var(--celeste-2);text-transform:uppercase;letter-spacing:2px;margin:0 0 10px;display:flex;align-items:center;gap:8px;}
.hc-big{font-size:32px;font-weight:900;line-height:1.1;margin:0 0 8px;color:var(--navy);}
.home-card.dark .hc-big{color:#fff;}
.hc-desc{color:var(--muted);font-size:14px;line-height:1.5;margin:0 0 14px;}
.home-card.dark .hc-desc{color:#cfe2f5;}
.hc-cta{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;background:var(--sol);color:var(--navy);font-weight:800;text-decoration:none;border-radius:10px;border:none;cursor:pointer;font-size:14px;transition:.18s;}
.hc-cta:hover{background:var(--sol-2);transform:translateY(-2px);box-shadow:0 6px 16px rgba(246,180,14,.35);}
.next-match{background:linear-gradient(135deg,var(--celeste-2) 0%,var(--navy-2) 100%);color:#fff;border-radius:16px;padding:22px;text-align:center;margin-bottom:18px;}
.next-match .nm-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--sol-2);font-weight:800;margin-bottom:10px;}
.next-match .nm-teams{display:flex;align-items:center;justify-content:center;gap:18px;font-size:22px;font-weight:900;flex-wrap:wrap;}
.next-match .nm-teams .fl{width:36px;height:27px;}
.next-match .nm-vs{font-size:14px;color:var(--sol-2);font-weight:800;letter-spacing:2px;}
.next-match .nm-when{margin-top:10px;font-size:13px;color:#cfe2f5;}
.quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:16px;}
.quick-link{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 14px;text-align:center;cursor:pointer;transition:.18s;border-top:4px solid var(--celeste);}
.quick-link:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(74,144,194,.18);border-top-color:var(--sol);}
.quick-link .ql-icon{font-size:30px;line-height:1;}
.quick-link .ql-name{margin-top:8px;font-weight:800;color:var(--navy);font-size:14px;}
.quick-link .ql-sub{font-size:11px;color:var(--muted);margin-top:2px;}

/* ===== FIXTURE / CALENDARIO ===== */
.fx-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.fx-filters select,.fx-filters input{padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink);min-width:140px;}
.fx-filters .fx-count{margin-left:auto;font-size:13px;color:var(--muted);font-weight:700;}
.fx-periods{display:flex;gap:6px;flex-wrap:wrap;width:100%;order:-1;}
.fx-period-btn{border:1px solid #cfe0f3;background:#fff;color:var(--navy);border-radius:999px;padding:8px 12px;font-family:inherit;font-size:12px;font-weight:900;cursor:pointer;transition:.15s;}
.fx-period-btn:hover{border-color:var(--celeste);background:#f3f9ff;}
.fx-period-btn.active{background:var(--navy);border-color:var(--navy);color:#fff;box-shadow:0 8px 18px rgba(11,37,69,.14);}
.fx-day{margin:18px 0;}
.fx-day-h{font-size:14px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:1.5px;padding:8px 14px;background:linear-gradient(90deg,var(--celeste-3) 0%,#fff 100%);border-left:5px solid var(--celeste);border-radius:8px;margin-bottom:10px;}
.fx-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(320px,100%),1fr));gap:10px;}
.fx-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;transition:.18s;border-left:4px solid var(--celeste);}
.fx-card:hover{transform:translateX(2px);box-shadow:0 6px 18px rgba(11,37,69,.08);}
.fx-card.knockout{border-left-color:var(--sol);}
.fx-card .fx-time{font-size:13px;font-weight:800;color:var(--navy);background:var(--bg-soft);padding:6px 8px;border-radius:8px;text-align:center;min-width:54px;font-variant-numeric:tabular-nums;}
.fx-card .fx-time small{display:block;font-size:9px;color:var(--muted);font-weight:600;letter-spacing:.5px;}
.fx-card .fx-teams{flex:1;display:flex;flex-direction:column;gap:3px;font-size:14px;font-weight:700;}
.fx-card .fx-teams .ft{display:flex;align-items:center;gap:7px;}
.fx-card .fx-teams .fl{width:22px;height:16px;}
.fx-card .fx-meta{font-size:11px;color:var(--muted);font-weight:700;text-align:right;display:flex;flex-direction:column;gap:2px;}
.fx-card .fx-meta .fx-grp{display:inline-block;background:var(--celeste);color:#fff;padding:2px 7px;border-radius:5px;font-size:10px;letter-spacing:.5px;}
.fx-card.knockout .fx-meta .fx-grp{background:var(--sol);color:var(--navy);}

/* ===== FIXTURE CARDS v2 (estilo referencia) ===== */
.fx-list2{display:flex;flex-direction:column;gap:10px;}
.fx-card2{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 18px;transition:.15s;}
.fx-card2:hover{box-shadow:0 8px 20px rgba(11,37,69,.08);}
.fx-card2.knockout{border-left:4px solid var(--sol);}
.fx-card2-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px;}
.fx-stadium{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fx-time-chip{background:var(--celeste);color:#fff;padding:5px 14px;border-radius:20px;font-weight:800;font-size:12px;letter-spacing:.5px;white-space:nowrap;}
.fx-card2.knockout .fx-time-chip{background:var(--sol);color:var(--navy);}
.fx-card2-teams{display:flex;align-items:center;justify-content:center;gap:14px;padding:10px 0;font-size:17px;font-weight:800;color:var(--navy);}
.fx-card2-teams .fx-team-r{flex:1;text-align:right;display:flex;align-items:center;justify-content:flex-end;gap:8px;min-width:0;}
.fx-card2-teams .fx-team-l{flex:1;text-align:left;display:flex;align-items:center;gap:8px;min-width:0;}
.fx-card2-teams .fx-team-r .fl,.fx-card2-teams .fx-team-l .fl{flex-shrink:0;width:28px;height:21px;}
.fx-card2-teams .fx-vs{color:var(--muted);font-size:13px;font-weight:700;letter-spacing:2px;}
.fx-card2-tv{display:flex;align-items:center;gap:6px;padding-top:10px;border-top:1px dashed var(--line);margin-top:6px;flex-wrap:wrap;}
.fx-prode{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;padding:9px 10px;border:1px solid #dbeafe;background:#f8fbff;border-radius:10px;flex-wrap:wrap;}
.fx-prode-main{display:flex;align-items:center;gap:8px;min-width:0;flex-wrap:wrap;}
.fx-prode-label{font-size:11px;font-weight:900;color:#2563eb;text-transform:uppercase;letter-spacing:.6px;}
.fx-prode-pick{font-weight:900;color:#0f172a;font-variant-numeric:tabular-nums;}
.fx-prode-points{display:inline-flex;align-items:center;justify-content:center;min-width:38px;height:28px;border-radius:999px;background:#e2e8f0;color:#475569;font-weight:950;font-size:13px;font-variant-numeric:tabular-nums;}
.fx-prode-points.good{background:#dcfce7;color:#047857;}
.fx-prode-points.exact{background:#fef3c7;color:#92400e;}
.fx-prode.locked{background:#f8fafc;border-color:#e2e8f0;}
.tv-label{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-right:4px;}
.tv-chip{font-size:11px;font-weight:800;padding:3px 9px;border-radius:7px;letter-spacing:.3px;color:#fff;}
.tv-dsports{background:#16a34a;}
.tv-telefe{background:#ef4444;}
.tv-disney{background:#1e3a8a;}
.tv-tycsports{background:#2563eb;}
@media(max-width:600px){
  .fx-card2-teams{font-size:15px;gap:10px;}
}

/* ===== SEDES ===== */
.sede-country{margin-bottom:24px;}
.sede-country-h{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;padding:8px 14px;background:linear-gradient(90deg,var(--celeste-3) 0%,#fff 80%);border-radius:10px;border-left:5px solid var(--celeste);}
.sede-country-h .sc-flag{font-size:18px;}
.sede-country-h .sc-count{margin-left:auto;background:var(--celeste);color:#fff;padding:3px 10px;border-radius:8px;font-size:12px;letter-spacing:.5px;}
.sedes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(280px,100%),1fr));gap:14px;}
.sede-card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:.2s;display:flex;flex-direction:column;cursor:pointer;}
.sede-card:hover{transform:translateY(-4px);box-shadow:0 14px 30px rgba(11,37,69,.14);}
.sede-cover{height:170px;background-size:cover;background-position:center;background-color:#0c2a4d;background-image:linear-gradient(135deg,var(--celeste-2) 0%,var(--navy) 100%);position:relative;display:flex;align-items:flex-end;padding:14px;color:#fff;transition:.3s;}
.sede-cover.us{background-image:linear-gradient(135deg,#1d4ed8 0%,#991b1b 100%);}
.sede-cover.mx{background-image:linear-gradient(135deg,#059669 0%,#991b1b 100%);}
.sede-cover.ca{background-image:linear-gradient(135deg,#dc2626 0%,#7f1d1d 100%);}
.sede-cover .sede-icon{font-size:64px;opacity:.18;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-shadow:0 4px 14px rgba(0,0,0,.3);}
.sede-cover .sede-city{font-weight:800;font-size:11px;text-shadow:0 2px 8px rgba(0,0,0,.55);z-index:2;letter-spacing:1.5px;color:#cfe2f5;}
.sede-cover .sede-overlay-name{position:absolute;bottom:14px;left:14px;right:14px;font-weight:900;font-size:19px;text-shadow:0 2px 10px rgba(0,0,0,.6);z-index:2;line-height:1.15;margin-top:4px;}
.sede-cover .sede-city{position:absolute;bottom:36px;left:14px;}
.sede-tag-cover{position:absolute;top:12px;right:12px;font-size:11px;background:var(--sol);color:var(--navy);padding:3px 10px;border-radius:7px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;z-index:3;box-shadow:0 4px 10px rgba(0,0,0,.2);}
.sede-tag-cover.sol{background:var(--celeste);color:#fff;}
.sede-body{padding:14px 16px;flex:1;}
.sede-body .sede-stats{display:flex;justify-content:space-between;gap:10px;font-size:13px;color:var(--muted);flex-wrap:wrap;}
.sede-body .sede-stats b{color:var(--navy);}
.sede-body .sede-cta{margin-top:8px;font-size:12px;color:var(--celeste-2);font-weight:800;}

/* ===== PLANTELES ===== */
.pl-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.pl-filters input,.pl-filters select{padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:#fff;font-family:inherit;min-width:160px;}
.planteles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(260px,100%),1fr));gap:12px;}
.pl-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;transition:.18s;cursor:pointer;border-top:4px solid var(--celeste);}
.pl-card:hover{transform:translateY(-3px);box-shadow:0 12px 24px rgba(11,37,69,.1);border-top-color:var(--sol);}
.pl-card .pl-head{display:flex;align-items:center;gap:10px;}
.pl-card .pl-flag-big{width:42px;height:31px;border-radius:4px;box-shadow:0 0 1px rgba(0,0,0,.5);object-fit:cover;}
.pl-card h4{margin:0;font-size:16px;color:var(--navy);}
.pl-card .pl-grp{display:inline-block;background:var(--celeste);color:#fff;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:800;margin-top:3px;}
.pl-card .pl-rank{margin-left:auto;font-size:11px;color:var(--muted);text-align:right;font-weight:700;}
.pl-card .pl-rank b{color:var(--sol);font-size:20px;display:block;}
.pl-card .pl-row{display:flex;justify-content:space-between;margin-top:10px;font-size:13px;padding:4px 0;border-bottom:1px dashed var(--line);}
.pl-card .pl-row:last-child{border-bottom:none;}
.pl-card .pl-row .pl-k{color:var(--muted);}
.pl-card .pl-row .pl-v{font-weight:700;color:var(--ink);text-align:right;}
.pl-stars{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.pl-star{font-size:11px;background:var(--bg-soft);padding:3px 8px;border-radius:6px;color:var(--navy);font-weight:600;}

/* ===== CALENDARIO (grilla mensual) ===== */
.cal-toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 18px;margin-bottom:16px;}
.cal-ics{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;background:var(--celeste);color:#fff;border:none;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;transition:.18s;}
.cal-ics:hover{background:var(--celeste-2);transform:translateY(-2px);box-shadow:0 6px 14px rgba(117,170,219,.35);}
.cal-help{color:var(--muted);font-size:13px;}
.cal-help b{color:var(--navy);}
.cal-month{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px;}
.cal-month-h{font-weight:900;font-size:17px;color:var(--navy);margin:0 0 14px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-dow{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;text-align:center;padding-bottom:4px;}
.cal-day{aspect-ratio:1;border:1px solid var(--line);border-radius:10px;padding:6px;display:flex;flex-direction:column;justify-content:space-between;background:#fff;cursor:pointer;transition:.15s;position:relative;}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default;}
.cal-day.empty:not([data-date]){border-color:transparent;background:transparent;}
.cal-day .cal-num{font-weight:700;font-size:13px;color:var(--ink);}
.cal-day.empty[data-date] .cal-num{color:var(--muted);font-weight:600;}
.cal-day.has{border-color:var(--celeste-3);}
.cal-day.has:hover{background:#eef6fc;transform:translateY(-1px);}
.cal-day.focus{background:linear-gradient(135deg,#eef6fc 0%,#fff 100%);border:2px solid var(--celeste);box-shadow:0 4px 14px rgba(117,170,219,.25);}
.cal-day .cal-badge{align-self:flex-end;background:var(--celeste);color:#fff;border-radius:9px;font-size:10px;font-weight:900;padding:2px 7px;line-height:1;}
.cal-day-box{background:linear-gradient(135deg,#eef6fc 0%,#fff 100%);border:1px solid var(--celeste-3);border-radius:14px;padding:18px;margin-top:14px;}

.bottom-nav{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.95);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:none;justify-content:space-around;align-items:stretch;z-index:100;padding:6px 4px calc(env(safe-area-inset-bottom,0px) + 6px);box-shadow:0 -8px 24px rgba(11,37,69,.08);}
.bn-btn{flex:1;background:none;border:none;color:var(--muted);padding:8px 4px 6px;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:700;letter-spacing:.3px;transition:.18s;border-radius:10px;min-width:0;}
.bn-btn .bn-ic{font-size:22px;line-height:1;}
.bn-btn.active{color:var(--celeste-2);}
.bn-btn.active .bn-ic{transform:scale(1.05);}
.bn-btn:active{background:var(--bg-soft);}

  .bottom-nav{display:flex;}

/* ===== PLANTELES v2 (lista alfabética + modal roster) ===== */
.pl-intro{display:flex;gap:14px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:14px;}
.pl-intro-ic{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--celeste-3),var(--celeste));display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.pl-intro h3{margin:0 0 4px;font-size:17px;color:var(--navy);}
.pl-intro p{margin:0;color:var(--muted);font-size:13px;line-height:1.45;}
.pl-intro p b{color:var(--navy);}
.planteles-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(240px,100%),1fr));gap:8px;}
.pl-row-card{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;cursor:pointer;transition:.18s;}
.pl-row-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(11,37,69,.1);border-color:var(--celeste);}
.pl-row-card .pl-flag-big{width:32px;height:24px;border-radius:4px;box-shadow:0 0 1px rgba(0,0,0,.5);object-fit:cover;flex-shrink:0;}
.pl-row-card .pl-info{flex:1;min-width:0;}
.pl-row-card .pl-info h4{margin:0;font-size:15px;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pl-row-card .pl-info .pl-grp{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;}
.pl-row-card .pl-arrow{color:var(--celeste);font-weight:900;font-size:18px;}

/* Roster (dentro del modal) */
.roster-list{display:flex;flex-direction:column;gap:2px;background:var(--bg-soft);border-radius:12px;padding:6px;}
.roster-row{display:flex;align-items:center;gap:12px;padding:10px 12px;background:#fff;border-radius:9px;}
.roster-row .r-no{width:30px;text-align:center;font-weight:900;color:var(--muted);font-size:13px;font-variant-numeric:tabular-nums;}
.roster-row .r-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--celeste-3) 0%,var(--celeste) 100%);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex-shrink:0;text-shadow:0 1px 2px rgba(0,0,0,.2);}
.roster-row .r-main{flex:1;min-width:0;}
.roster-row .r-name{font-weight:700;color:var(--navy);font-size:14px;display:flex;align-items:center;gap:6px;}
.roster-row .r-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.roster-row .r-stats{display:flex;gap:8px;text-align:right;flex-shrink:0;}
.roster-row .r-stat{display:flex;flex-direction:column;align-items:center;min-width:36px;}
.roster-row .r-stat b{font-size:14px;font-weight:900;color:var(--navy);line-height:1;}
.roster-row .r-stat span{font-size:9px;color:var(--muted);letter-spacing:.5px;font-weight:700;margin-top:2px;text-transform:uppercase;}
.cap-badge{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--sol);color:var(--navy);font-weight:900;font-size:10px;}

/* ===== HISTORIA ===== */
.hist-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(260px,100%),1fr));gap:12px;}
.hist-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;transition:.18s;border-left:5px solid var(--celeste);}
.hist-card:hover{transform:translateY(-3px);box-shadow:0 12px 24px rgba(11,37,69,.1);}
.hist-card.iconic{border-left-color:var(--sol);background:linear-gradient(135deg,#fffdf3 0%,#fff 100%);}
.hist-year{font-size:30px;font-weight:900;color:var(--navy);line-height:1;}
.hist-host{color:var(--muted);font-size:12px;margin-top:4px;text-transform:uppercase;letter-spacing:1px;font-weight:700;}
.hist-champ{margin-top:12px;display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;color:var(--navy);}

.hist-row{margin-top:8px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between;}
.hist-row b{color:var(--ink);}

/* ===== ZONAS ===== */
.zonas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(290px,100%),1fr));gap:12px;}
.zona-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;border-top:4px solid var(--celeste);}

.zona-card .zh .zl{background:var(--celeste);color:#fff;border-radius:8px;padding:4px 12px;font-size:14px;}
.zona-card .zt{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px dashed var(--line);font-size:14px;font-weight:600;}
.zona-card .zt:last-child{border-bottom:none;}
.zona-card .zt .fl{width:22px;height:16px;}

/* ===== MODAL DE DETALLE ===== */
.modal-bg{position:fixed;inset:0;background:rgba(8,23,43,.78);backdrop-filter:blur(6px);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:30px 14px;overflow-y:auto;}

.modal-head{background:linear-gradient(135deg,var(--celeste-2) 0%,var(--navy) 100%);color:#fff;padding:24px 26px;position:relative;}

.modal-stat{background:var(--bg-soft);border-radius:10px;padding:12px;text-align:center;}
.modal-stat b{display:block;font-size:24px;font-weight:900;color:var(--navy);line-height:1;}
.modal-stat span{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:5px;font-weight:700;}
.modal-section{margin-top:18px;}
.modal-section h3{font-size:13px;font-weight:800;color:var(--celeste-2);text-transform:uppercase;letter-spacing:1.5px;margin:0 0 10px;display:flex;align-items:center;gap:8px;}

function tname(n){return (n||'').replace('*','').trim();}
function team(n){const c=FLAG[tname(n)];return (c?`<img class="fl" src="https://flagcdn.com/24x18/${c}.png" loading="lazy" alt="">`:'')+n;}

function standRows(st,ptsLabel){
  ptsLabel=ptsLabel||'Pts';
  let h=`<table class="stand"><tr><th>#</th><th>Equipo</th><th>${ptsLabel}</th><th>DG</th></tr>`;
  st.forEach((r,i)=>{h+=`<tr class="p${i+1}"><td class="c">${i+1}</td><td>${team(r[0])}</td><td class="c">${r[1]!==''?r[1]:'—'}</td><td class="c">${r[2]!==''?r[2]:'—'}</td></tr>`;});
  return h+'</table>';
}
function matchRows(m){
  let h='<div class="mtable">';
  m.forEach(x=>{h+=`<div class="row"><span class="h">${team(x[0])}</span><span class="sc">${x[1]}</span><span class="a">${team(x[2])}</span></div>`;});
  return h+'</div>';
}
function fixtureHTML(a){
  if(a.consensus){
    let h='<div class="grid">';
    for(const g of "ABCDEFGHIJKL"){const G=a.groups[g];h+=`<div class="gcard"><h4><span class="gl">${g}</span>Grupo ${g}</h4>${standRows(G.st,'Votos')}</div>`;}
    h+='</div>';
    h+=`<div class="banner">🎟️ <b>Mejores terceros (consenso):</b> ${a.thirds}</div>`;
    h+=`<div class="awards" style="border:2px solid ${a.accent}"><div class="a" style="border-bottom:2px solid ${a.accent}"><span class="k" style="font-size:16px;color:${a.accent};font-weight:800">VEREDICTO DEL CONSENSO</span><span></span></div>`;
    a.verdict.forEach(w=>{h+=`<div class="a"><span class="k">${w[0]}</span><span class="v">${w[1]}</span></div>`;});
    h+='</div>';
    return h;
  }
  let h='';
  if(a.note) h+=`<div class="banner" style="background:#334155">ℹ️ ${a.note}</div>`;
  h+='<div class="grid">';
  for(const g of "ABCDEFGHIJKL"){
    const G=a.groups[g];
    h+=`<div class="gcard"><h4><span class="gl">${g}</span>Grupo ${g}</h4>${standRows(G.st)}${a.noscore?'':matchRows(G.m)}</div>`;
  }
  h+='</div>';
  h+=`<div class="banner">🎟️ <b>Mejores terceros (clasifican):</b> ${a.thirds}</div>`;
  h+='<div class="ko">';
  for(const round in a.ko){
    h+=`<h3>${round}</h3><div class="kotable"><table>`;
    a.ko[round].forEach(x=>{
      const isFinal=(round==='FINAL');
      const hw=(x[4]===x[1])?'win':'', aw=(x[4]===x[3])?'win':'';
      h+=`<tr class="${isFinal?'final-row':''}"><td class="num">${x[0]||''}</td><td class="home ${hw}">${team(x[1])}</td><td class="sc">${x[2]}</td><td class="away ${aw}">${team(x[3])}</td></tr>`;
    });
    h+='</table></div>';
  }
  h+='</div>';
  h+='<div class="awards">';
  a.awards.forEach(w=>{h+=`<div class="a"><span class="k">${w[0]}</span><span class="v">${w[1]}</span></div>`;});
  h+='</div>';
  return h;
}

async function groupsForAutoSync(){

  myGroups().forEach(g=>{if(g&&g.id)fallback.set(String(g.id).toUpperCase().slice(0,6),g.name||g.id);});

    box.innerHTML=groups.map(g=>`<div class="my-group-card"><div><div class="my-group-name">👥 ${esc(g.name)}</div><div class="my-group-meta">Código ${esc(g.id)} · ${g.memberCount||0} participante(s)${g.updated?' · última carga '+grTimeLabel(g.updated):''}</div></div><button class="gr-mini" data-open-group="${esc(g.id)}">Abrir</button></div>`).join('');

  }catch(e){box.className='my-group-empty';box.textContent='No pude cargar tus grupos. Probá de nuevo en unos segundos.';}
}

function myGroupsHTML(){const l=myGroups();if(!l.length)return '';const u=authUser();

function renderGrupos(){const cont=document.getElementById('gr-content');if(!cont)return;const p=grParam();
  if(p){cont.innerHTML='<div id="gr-view"></div>';loadGroup(p);return;}
  cont.innerHTML=grFormHTML();
  loadMyGroups();
  cont.querySelector('#gr-create').onclick=createGroup;
  const goCode=()=>{const c=cont.querySelector('#gr-code').value.trim().toUpperCase().replace(/\s+/g,'');if(c)openGroup(c);};
  cont.querySelector('#gr-go').onclick=goCode;
  cont.querySelector('#gr-code').addEventListener('keydown',e=>{if(e.key==='Enter')goCode();});}
async function createGroup(){const gn=document.getElementById('gr-newname').value.trim()||'Mi grupo';let nm=document.getElementById('gr-newplayer').value.trim()||grName()||'Anónimo';nm=nm.slice(0,30);localStorage.setItem('prode_name',nm);
  try{const r=await fetch(GR_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'create',name:gn,pid:grPid(),player:nm,picks:currentPicks()})});const j=await r.json();if(!j.id)throw 0;openGroup(j.id);pbToast('Grupo creado 🎉');}catch(e){pbToast('No se pudo crear (¿DB conectada?)');}}
async function joinGroup(id){let nm=grName()||prompt('Tu nombre para el grupo:');if(nm===null)return;nm=(nm||'Anónimo').slice(0,30);localStorage.setItem('prode_name',nm);
  try{const r=await fetch(GR_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'submit',id:id,pid:grPid(),player:nm,picks:currentPicks()})});if(!r.ok)throw 0;pbToast('¡Prode cargado al grupo! ✅');loadGroup(id);}catch(e){pbToast('No se pudo guardar');}}
function grOpenProde(m){
  const p=m.picks||{};
  const defs=[
    ['Campeón',p.camp||memberChampion(p)||''],
    ['Subcampeón',p.sub||''],
    ['Tercero',p.ter||''],
    ['Cuarto',p.cua||''],
    ['Goleador',p.gol||''],
    ['Mejor jugador',p.mvp||'']
  ];
  let groups='<div class="gr-prode-groups">';
  for(const g in GRUPOS){
    const st=picksStandings(g,p.ms||{});
    groups+=`<div class="gr-prode-group"><div class="gr-prode-gh"><span>Grupo ${g}</span><span>${st[0]?team(st[0].t):'—'}</span></div>`;
    gfixOrder(g).forEach(o=>{const pr=o.pr,idx=o.idx;const home=GRUPOS[g][pr[0]],away=GRUPOS[g][pr[1]],sc=(p.ms||{})[g+idx];const empty=!(sc&&sc[0]!=null&&sc[1]!=null);groups+=`<div class="gr-match-row"><span class="gr-match-team r">${team(home)}</span><span class="gr-score ${empty?'empty':''}">${grScoreLabel(sc)}</span><span class="gr-match-team">${team(away)}</span></div>`;});
    groups+=`<table class="gr-prode-table"><tr><th>#</th><th>Equipo</th><th>Pts</th><th>DG</th></tr>${[0,1,2,3].map(i=>`<tr><td>${i+1}</td><td>${st[i]?team(st[i].t):'—'}</td><td>${st[i]?st[i].pts:0}</td><td>${st[i]?(st[i].dg>0?'+':'')+st[i].dg:'0'}</td></tr>`).join('')}</table></div>`;
  }
  groups+='</div>';
  const ko=(ROUNDS||[]).map(rd=>{const ws=rd[1].map(x=>(p.kb||{})[x[0]]).filter(Boolean);return ws.length?`<div class="mtag"><b>${rd[0]}:</b> ${ws.map(grPickLabel).join(', ')}</div>`:'';}).filter(Boolean).join('');
  openModal(`<div class="modal-head">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>Prode de ${esc(m.name||'Anónimo')}</h2>
    <div class="modal-sub">${m.pts||0} puntos actuales · última carga ${m.updated?new Date(m.updated).toLocaleString('es-AR'):'sin fecha'}</div>
  </div>
  <div class="modal-body">
    <div class="modal-stats">${defs.map(d=>`<div class="modal-stat"><b style="font-size:15px">${d[1]?grPickLabel(d[1]):'—'}</b><span>${d[0]}</span></div>`).join('')}</div>
    <div class="modal-section"><h3>Fase de grupos</h3>${groups}</div>
    <div class="modal-section"><h3>Eliminatorias</h3><div class="modal-grid">${ko||'<div class="mtag">Todavía no cargó ganadores de eliminatorias.</div>'}</div></div>
  </div>`);
}
async function claimGroupOwner(id){
  try{
    const r=await fetch(GR_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'claim_owner',id:id,pid:grPid(),player:grName()||'Joel'})});
    if(!r.ok)throw 0;
    pbToast('Joel quedó como dueño');
    loadGroup(id);
  }catch(e){pbToast('No pude asignar dueño');}
}
async function renameGroupMember(id){
  const current=grName()||'';
  let nm=prompt('Nuevo nombre para mostrar en el grupo:',current);
  if(nm===null)return;
  nm=(nm||'Anónimo').trim().slice(0,30)||'Anónimo';
  localStorage.setItem('prode_name',nm);
  try{
    const r=await fetch(GR_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'rename_member',id:id,pid:grPid(),player:nm})});
    if(!r.ok)throw 0;
    pbToast('Nombre actualizado');
    loadGroup(id);
  }catch(e){pbToast('No se pudo cambiar el nombre');}
}
async function deleteGroupMember(id,targetPid,name){
  if(!confirm('¿Borrar a '+(name||'este participante')+' del grupo?'))return;
  try{
    const r=await fetch(GR_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'delete_member',id:id,ownerPid:grPid(),targetPid:targetPid})});
    if(!r.ok)throw 0;
    pbToast('Participante borrado');
    loadGroup(id);
  }catch(e){pbToast('No se pudo borrar');}
}
async function leaveGroup(id,isOwner,memberCount){
  if(isOwner&&memberCount>1){pbToast('Sos dueño: primero borrá participantes o pasá el grupo');return;}
  if(!confirm('¿Salir de este grupo? Tu prode se borra solo de este grupo.'))return;
  try{
    const r=await fetch(GR_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'leave_member',id:id,pid:grPid()})});
    const j=await r.json().catch(()=>({}));
    if(!r.ok)throw j;
    forgetGroup(id);
    pbToast('Saliste del grupo');
    history.replaceState(null,'',location.pathname+'#GRUPOS');
    renderGrupos();
  }catch(e){pbToast(e&&e.error==='dueno_con_participantes'?'Como dueño no podés salir si hay participantes':'No se pudo salir del grupo');}
}
async function loadGroup(id){const cont=document.getElementById('gr-view');if(!cont)return;cont.innerHTML='<div class="live-empty">Cargando grupo…</div>';
  let g;try{const r=await fetch(GR_API+'?id='+encodeURIComponent(id));if(!r.ok)throw 0;g=await r.json();}catch(e){cont.innerHTML='<div class="live-empty">No se encontró el grupo, o estás abriendo el archivo local. Los grupos funcionan en el sitio publicado (Vercel).<br><br><a href="'+location.pathname+'" style="color:#7c3aed;font-weight:700">← Volver</a></div>';return;}
  const actual=await fetchActual();
  const localPid=grPid();
  const isOwner=!!(g.ownerPid&&g.ownerPid===localPid);
  const members=Object.entries(g.entries||{}).map(([pid,m])=>({pid:pid,name:m.name,picks:m.picks||{},submittedAt:m.submittedAt||m.updated||0,updated:m.updated||0,pts:scoreMember(m.picks||{},actual)}));
  members.sort((a,b)=>b.pts-a.pts||(a.name||'').localeCompare(b.name||''));
  const link=location.origin+location.pathname+'?grupo='+g.id;
  const localEntry=(g.entries||{})[localPid];
  if(localEntry)rememberGroup(g.id,g.name);
  const ownerEntry=g.ownerPid&&(g.entries||{})[g.ownerPid];
  const canClaim=localEntry&&grIsJoel(localEntry.name||grName())&&(!g.ownerPid||(g.ownerPid!==localPid&&grIsJoel(ownerEntry&&ownerEntry.name)));
  let h=`<div class="gr-head"><div><div class="gr-name">👥 ${esc(g.name)} ${isOwner?'<span class="gr-owner">Dueño</span>':''}</div><div class="gr-sub">Código <b>${g.id}</b> · ${members.length} participante(s)</div></div><div class="gr-actions"><button class="pb-btn" id="gr-join">➕ Sumar / actualizar mi prode</button>${localEntry?'<button class="pb-btn alt" id="gr-rename">Cambiar mi nombre</button><button class="pb-btn ghost" id="gr-leave">Salir del grupo</button>':''}</div></div>`;
  h+=`<div class="gr-share">📎 <input readonly id="gr-link" value="${link}"><button class="pb-btn alt" id="gr-copy">Copiar link</button></div>`;
  if(canClaim)h+=`<div class="gr-legacy"><span>Podés pasar el rol de dueño a esta cuenta Joel para administrar el grupo desde tu login.</span><button class="gr-mini" id="gr-claim">Hacer dueño a esta cuenta</button></div>`;
  if(!members.length){h+='<div class="live-empty">Todavía no hay prodes cargados. Armá el tuyo y tocá “Sumar mi prode”.</div>';}
  else{h+='<table class="gr-table"><tr><th>#</th><th>Jugador</th><th>Campeón</th><th>Última carga</th><th>Pts</th><th>Acciones</th></tr>';
    members.forEach((m,i)=>{const ownerBadge=(g.ownerPid&&m.pid===g.ownerPid)?' <span class="gr-owner">Dueño</span>':'';h+=`<tr><td>${i+1}</td><td>${esc(m.name)}${ownerBadge}</td><td>${m.picks?grPickLabel(memberChampion(m.picks)):'—'}</td><td>${grTimeLabel(m.updated)}</td><td><b>${m.pts}</b></td><td><div class="gr-actions"><button class="gr-mini" data-view-prode="${esc(m.pid)}">Ver prode</button>${isOwner&&m.pid!==localPid?`<button class="gr-mini del" data-del-member="${esc(m.pid)}" data-del-name="${esc(m.name)}">Borrar</button>`:''}</div></td></tr>`;});
    h+='</table><p class="gr-note">Puntos automáticos: posiciones de grupo (3 por 1º, 2 por 2º, 1 por 3º) + partidos de grupo en vivo/finalizados (1 por acertar ganador/empate, 3 por resultado exacto). La hora muestra cuándo se cargó o actualizó el prode.</p>';}
  h+='<p class="gr-note"><a href="'+location.pathname+'" style="color:#7c3aed;font-weight:700">← Crear / entrar a otro grupo</a></p>';
  cont.innerHTML=h;
  const cp=cont.querySelector('#gr-copy');if(cp)cp.onclick=()=>{const i=document.getElementById('gr-link');i.select();try{navigator.clipboard.writeText(i.value);}catch(e){}pbToast('Link copiado 📋');};
  const claim=cont.querySelector('#gr-claim');if(claim)claim.onclick=()=>claimGroupOwner(g.id);
  const rename=cont.querySelector('#gr-rename');if(rename)rename.onclick=()=>renameGroupMember(g.id);
  const leave=cont.querySelector('#gr-leave');if(leave)leave.onclick=()=>leaveGroup(g.id,isOwner,members.length);
  cont.querySelectorAll('[data-view-prode]').forEach(b=>b.onclick=()=>{const m=members.find(x=>x.pid===b.dataset.viewProde);if(m)grOpenProde(m);});
  cont.querySelectorAll('[data-del-member]').forEach(b=>b.onclick=()=>deleteGroupMember(g.id,b.dataset.delMember,b.dataset.delName));
  cont.querySelector('#gr-join').onclick=()=>joinGroup(g.id);}

const KICKOFF=new Date('2026-06-11T16:00:00-03:00').getTime();
const MUNDIAL_END=new Date('2026-07-19T23:59:00-03:00').getTime();
function tickCountdown(){
  const now=Date.now();
  const dEl=document.getElementById('cd-d'),hEl=document.getElementById('cd-h'),mEl=document.getElementById('cd-m'),sEl=document.getElementById('cd-s'),lab=document.getElementById('cd-label');
  if(!dEl)return;
  const diff=KICKOFF-now;
  if(diff>0){
    const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
    dEl.textContent=String(d).padStart(2,'0');hEl.textContent=String(h).padStart(2,'0');
    mEl.textContent=String(m).padStart(2,'0');sEl.textContent=String(s).padStart(2,'0');
    if(lab)lab.textContent='Arranca en';
  }else if(now<MUNDIAL_END){
    if(lab)lab.innerHTML='<span class="cd-live">🔴 EL MUNDIAL ESTÁ EN VIVO</span>';
    dEl.textContent='--';hEl.textContent='--';mEl.textContent='--';sEl.textContent='--';
  }else{
    if(lab)lab.textContent='Mundial finalizado';
  }
}

// ===== FIXTURE =====
function buildAllFixture(){
  // grupos (todos en es)
  const arr=[];
  CONFIRMED_FIXTURES.forEach(f=>{
    const k=f.dateEvent+'|'+f.strHomeTeam+'|'+f.strAwayTeam;
    const info=MATCH_INFO[k]||['14:00',0];
    const sede=SEDES[info[1]];
    const home=spName(f.strHomeTeam),away=spName(f.strAwayTeam),ref=prodeRefForTeams(home,away);
    arr.push({date:f.dateEvent,time:info[0],home:home,away:away,grp:f.strGroup,sede:sede,kind:'group',pkey:ref?ref.k:'',pg:ref?ref.g:'',pidx:ref?ref.idx:null,pflip:ref?ref.flip:false});
  });
  // knockouts (sin equipos asignados)
  KO_MATCHES.forEach(k=>{
    arr.push({date:k.date,time:k.time,home:'Por definir',away:'Por definir',grp:k.round,kind:'ko',sede:SEDES[k.sede]});
  });
  return arr.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
}

async function loadFixtureResults(){
  if(FX_RESULTS_LOADED)return;

  try{

      if(x.kind!=='group')return;
      const e=byKey.get([canonicalTeam(x.home),canonicalTeam(x.away)].join('|'));
      if(!e)return;
      x.realStatus=e.strStatus||'';

      x.realHomeScore=e.intHomeScore;
      x.realAwayScore=e.intAwayScore;

function fxLocalISO(offsetDays){
  const d=new Date();
  d.setDate(d.getDate()+(offsetDays||0));
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fxPlayed(x){
  const hasScore=x.realHomeScore!==null&&x.realHomeScore!==undefined&&x.realHomeScore!==''&&x.realAwayScore!==null&&x.realAwayScore!==undefined&&x.realAwayScore!=='';
  return hasScore||isFin(x.realStatus);
}
function fxInPeriod(x,period){
  if(period==='played')return fxPlayed(x);
  if(period==='upcoming')return !fxPlayed(x);
  if(period==='today')return x.date===fxLocalISO(0);
  if(period==='tomorrow')return x.date===fxLocalISO(1);
  if(period==='week'){const a=fxLocalISO(0),b=fxLocalISO(6);return x.date>=a&&x.date<=b;}
  return true;
}

function calGridHTML(year,month,byDate){
  // month 0-indexed, 5=junio, 6=julio
  const first=new Date(year,month,1);
  const startDow=(first.getDay()+6)%7; // lunes=0
  const last=new Date(year,month+1,0).getDate();
  const days=['LU','MA','MI','JU','VI','SÁ','DO'];
  let h='<div class="cal-grid">';
  days.forEach(d=>h+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<startDow;i++)h+='<div class="cal-day empty"></div>';
  for(let d=1;d<=last;d++){
    const iso=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const has=byDate[iso];
    const hasCls=has?'has':'empty';
    const focusCls=iso===CAL_FOCUS?'focus':'';
    h+=`<div class="cal-day ${hasCls} ${focusCls}" data-date="${iso}">
      <span class="cal-num">${d}</span>

  }

function icsTime(dateISO,timeHHMM){
  // build UTC timestamp from ART (UTC-3)
  const [h,m]=timeHHMM.split(':').map(Number);
  const d=new Date(`${dateISO}T${timeHHMM}:00-03:00`);
  const pad=n=>String(n).padStart(2,'0');
  return `${d.getUTCFullYear()}${pad(d.getUTCMonth()+1)}${pad(d.getUTCDate())}T${pad(d.getUTCHours())}${pad(d.getUTCMinutes())}00Z`;
}
function downloadICS(fixture){
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Prode2026//ES','CALSCALE:GREGORIAN','X-WR-CALNAME:Mundial 2026','X-WR-TIMEZONE:America/Argentina/Buenos_Aires'];
  fixture.forEach((x,i)=>{
    if(!x.date||!x.time)return;
    const start=icsTime(x.date,x.time);
    // 2h duración aprox
    const endDate=new Date(`${x.date}T${x.time}:00-03:00`);endDate.setHours(endDate.getHours()+2);
    const pad=n=>String(n).padStart(2,'0');
    const end=`${endDate.getUTCFullYear()}${pad(endDate.getUTCMonth()+1)}${pad(endDate.getUTCDate())}T${pad(endDate.getUTCHours())}${pad(endDate.getUTCMinutes())}00Z`;
    const summary=`⚽ ${x.home} vs ${x.away}`.replace(/[,;]/g,' ');
    const loc=x.sede?`${x.sede.n}, ${x.sede.c}`.replace(/[,;]/g,' '):'';
    const desc=`${x.grp||''}`.replace(/[,;]/g,' ');
    lines.push('BEGIN:VEVENT',`UID:mundial2026-${i}@joelpacheco`,`DTSTAMP:${start}`,`DTSTART:${start}`,`DTEND:${end}`,`SUMMARY:${summary}`,`LOCATION:${loc}`,`DESCRIPTION:${desc}`,'END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  const blob=new Blob([lines.join('\r\n')],{type:'text/calendar'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='mundial-2026.ics';a.click();URL.revokeObjectURL(url);
  pbToast('Calendario descargado 📅');
}

const SEDE_PHOTO_CACHE={};
async function fetchSedePhoto(sede){
  // Override manual tiene prioridad
  if(sede.photo)return sede.photo;
  const wikiUrl=sede.wiki;if(!wikiUrl)return null;
  if(SEDE_PHOTO_CACHE[wikiUrl]!==undefined)return SEDE_PHOTO_CACHE[wikiUrl];
  const m=wikiUrl.match(/\/wiki\/([^?#]+)/);if(!m){SEDE_PHOTO_CACHE[wikiUrl]=null;return null;}
  const title=m[1];
  const lang=wikiUrl.includes('es.wikipedia')?'es':'en';
  try{
    const r=await fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${title}`);
    if(!r.ok)throw 0;
    const j=await r.json();
    let url=j.thumbnail&&j.thumbnail.source||j.originalimage&&j.originalimage.source||null;
    // Si es un logo SVG, descartamos
    if(url&&/logo/i.test(url))url=null;
    SEDE_PHOTO_CACHE[wikiUrl]=url;return url;
  }catch(e){SEDE_PHOTO_CACHE[wikiUrl]=null;return null;}
}

  SQUADS_PROMISE=fetch('data/squads.json',{cache:'force-cache'}).then(r=>r.json()).then(d=>{SQUADS=d;return d;}).catch(e=>{console.error('No pude cargar squads',e);return {};});
  return SQUADS_PROMISE;
}
function getSquad(teamES){const en=TEAM_ES_TO_EN[teamES];return SQUADS&&en?SQUADS[en]:null;}
function ageNow(dob){if(!dob)return '';const t=new Date('2026-06-11'),d=new Date(dob);let a=t.getFullYear()-d.getFullYear();if(t.getMonth()<d.getMonth()||(t.getMonth()===d.getMonth()&&t.getDate()<d.getDate()))a--;return a;}
function avatarInitials(name){const parts=(name||'?').split(/\s+/);const i=(parts[0]||'?')[0]+(parts[parts.length-1]||'')[0];return i.toUpperCase();}

  const sq=getSquad(team);
  if(!sq||!sq.players||!sq.players.length){
    document.getElementById('modal').innerHTML=`<div class="modal-head">
      <button class="modal-close" onclick="closeModal()">×</button>
      <h2>${fcode?`<img class="fl" src="https://flagcdn.com/72x54/${fcode}.png" alt="">`:''} ${team}</h2>

    return;
  }
  const dt=sq.coach||meta.dt||'-';
  const captain=sq.players.find(p=>p.captain);
  const withCaps=sq.players.filter(p=>(p.caps||0)>=30).length;
  // group by position
  const byPos={GK:[],DF:[],MF:[],FW:[]};
  sq.players.forEach(p=>{if(byPos[p.pos])byPos[p.pos].push(p);else byPos.MF.push(p);});
  // sort each group by number
  POS_ORDER.forEach(k=>byPos[k].sort((a,b)=>(a.no||99)-(b.no||99)));
  // total caps & goals
  const totalGoals=sq.players.reduce((a,p)=>a+(p.goals||0),0);

  let h=`<div class="modal-head">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>${fcode?`<img class="fl" src="https://flagcdn.com/72x54/${fcode}.png" alt="">`:''} ${team}</h2>
    <div class="modal-sub">DT: ${dt} · ${sq.players.length} convocados · ${withCaps} con experiencia mundialista${captain?` · 🎖️ Capitán: ${captain.name}`:''}</div>
  </div>
  <div class="modal-body">
    <div class="modal-stats">
      <div class="modal-stat"><b>${meta.g||'-'}</b><span>Grupo</span></div>
      <div class="modal-stat"><b>#${meta.rk||'-'}</b><span>Ranking FIFA</span></div>
      <div class="modal-stat"><b>${meta.titles||0}</b><span>Mundiales</span></div>
      <div class="modal-stat"><b>${totalGoals}</b><span>Goles totales</span></div>
    </div>
    ${meta.nota?`<div class="modal-section"><p style="background:#fffbeb;padding:10px 14px;border-radius:10px;border-left:4px solid var(--sol);font-weight:600;font-size:13px">✨ ${meta.nota}</p></div>`:''}`;
  POS_ORDER.forEach(pos=>{
    const list=byPos[pos];if(!list.length)return;
    h+=`<div class="modal-section"><h3>${POS_LABEL[pos]} <span style="color:var(--muted);font-weight:600;margin-left:6px">${list.length}</span></h3><div class="roster-list">`;
    list.forEach(p=>{
      const age=ageNow(p.dob);
      const cap=p.captain?'<span class="cap-badge" title="Capitán">C</span>':'';
      const caps=p.caps||0,goals=p.goals||0;
      h+=`<div class="roster-row">
        <div class="r-no">${p.no||'-'}</div>
        <div class="r-avatar">${avatarInitials(p.name)}</div>
        <div class="r-main">
          <div class="r-name">${p.name}${cap}</div>
          <div class="r-sub">${p.club||''}${age?` · ${age} años`:''}</div>
        </div>
        <div class="r-stats">
          <div class="r-stat"><b>${caps}</b><span>PJ</span></div>
          ${goals>0?`<div class="r-stat"><b>${goals}</b><span>G</span></div>`:''}
        </div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  h+=`<div class="modal-links">
    <a class="modal-link" href="${wikiUrl}" target="_blank" rel="noopener">📖 Ver selección en Wikipedia ↗</a>
    <button class="modal-link sol" onclick="closeModal();setTimeout(()=>{goTab('FIXTURE');setTimeout(()=>{const s=document.getElementById('fx-team');if(s){s.value='${team.replace(/'/g,"\\'")}';s.dispatchEvent(new Event('change'));}},250);},150);">📅 Ver partidos de ${team}</button>
  </div></div>`;
  document.getElementById('modal').innerHTML=h;
}

// ===== NAV helper =====
function goTab(id){const b=document.querySelector('[data-tabid="'+id+'"]');if(b)b.click();else if(typeof activateTabExt==='function')activateTabExt(id);}
let activateTabExt=null;

function build(){
  const tabs=document.getElementById('agentTabs');
  const panels=document.getElementById('panels');

  function addTab(id,label,extraClass){
    const b=document.createElement('button');
    b.className='tab '+(extraClass||'');
    b.dataset.tabid=id;
    b.innerHTML=label;
    b.onclick=()=>activateTab(id);
    tabs.appendChild(b);
    return b;
  }
  function addPanel(id,inner){
    const p=document.createElement('div');p.className='panel';p.id='panel-'+id;p.innerHTML=inner;
    panels.appendChild(p);return p;
  }
  const LABELS={INICIO:'🏠 Inicio',FIXTURE:'📅 Fixture',CALENDARIO:'📆 Calendario',LIVE:'🔴 LIVE',PRODE:'🧩 Mi prode',GRUPOS:'👥 Grupos',ZONAS:'🗂️ Zonas',SEDES:'🏟️ Sedes',PLANTELES:'👕 Planteles',HISTORIA:'📜 Historia',Claude:'🤖 Claude',Codex:'🤖 Codex',Gemini:'🤖 Gemini',Kimi:'🤖 Kimi',Maldini:'🤖 Maldini'};
  function activateTab(id){
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    const t=document.querySelector('[data-tabid="'+id+'"]');
    const p=document.getElementById('panel-'+id);
    if(t)t.classList.add('active');
    if(p)p.classList.add('active');
    // Backbar dinámica (excepto en Inicio)
    if(p){
      const existing=p.querySelector(':scope > .backbar');
      if(id==='INICIO'){if(existing)existing.remove();}
      else if(!existing){
        const bb=document.createElement('div');
        bb.className='backbar';
        bb.innerHTML=`<button class="back-btn" onclick="goTab('INICIO')">← Inicio</button><span class="crumb">Estás en <b>${LABELS[id]||id}</b></span>`;
        p.insertBefore(bb,p.firstChild);
      }
    }
    if(id==='INICIO')renderInicio();
    else if(id==='FIXTURE')renderFixture();
    else if(id==='CALENDARIO')renderCalendario();
    else if(id==='ZONAS')renderZonas();
    else if(id==='SEDES')renderSedes();
    else if(id==='PLANTELES')renderPlanteles();
    else if(id==='HISTORIA')renderHistoria();
    else if(id==='LIVE')loadLive();
    else if(id==='GRUPOS')renderGrupos();
    // sync bottom nav
    document.querySelectorAll('.bn-btn').forEach(b=>{b.classList.toggle('active',b.dataset.bn===id);});
    try{history.replaceState(null,'',location.pathname+location.search+'#'+id);}catch(e){}
  }
  activateTabExt=activateTab;
  document.querySelectorAll('.bn-btn').forEach(b=>{b.onclick=()=>activateTab(b.dataset.bn);});

  // INICIO
  addTab('INICIO','🏠 Inicio');
  addPanel('INICIO',`<div id="inicio-content"></div>`);

  // FIXTURE
  addTab('FIXTURE','📅 Fixture');
  addPanel('FIXTURE',`<div class="champbar" style="background:linear-gradient(135deg,var(--celeste-2),var(--navy))"><span class="crown">📅</span><div><b>FIXTURE COMPLETO</b><br><span>Los 104 partidos del Mundial 2026 · hora Argentina</span></div></div><div id="fx-content"></div>`);

  addTab('CALENDARIO','📆 Calendario');

  // LIVE
  addTab('LIVE','LIVE','tab-live');
  addPanel('LIVE',`
    <div class="champbar" style="background:#ef4444">
      <span class="crown">🔴</span>
      <div style="flex:1"><b>RESULTADOS EN VIVO</b><br><span>Mundial 2026 · se actualiza cada 60 s</span></div>

      <div class="champbar" style="background:${a.accent}">
        <span class="crown">🏆</span>
        <div><b>CAMPEÓN: ${a.champ}</b><br><span>${a.tag}</span></div>
      </div>
      <div class="subtabs">
        <button class="subtab active" data-s="fx">📋 Fixture</button>
        <button class="subtab" data-s="ex">🧠 Explicación</button>
      </div>
      <div class="sub active" id="sub-${name}-fx">${fixtureHTML(a)}</div>
      <div class="sub" id="sub-${name}-ex"><div class="exp">${a.exp}</div></div>`);
    p.querySelectorAll('.subtab').forEach(b=>{
      b.onclick=()=>{
        p.querySelectorAll('.subtab').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        p.querySelectorAll('.sub').forEach(s=>s.classList.remove('active'));
        p.querySelector('#sub-'+name+'-'+b.dataset.s).classList.add('active');
      };
    });
    p.querySelectorAll('.ia-btn').forEach(b=>{b.onclick=()=>goTab(b.dataset.ia);});
  });

  // Activar por hash o por contexto
  const hash=(location.hash||'').replace('#','').toUpperCase();
  const valid=['INICIO','FIXTURE','CALENDARIO','LIVE','PRODE','GRUPOS','ZONAS','SEDES','PLANTELES','HISTORIA'].concat(ORDER.map(x=>x.toUpperCase()));
  let initial='INICIO';
  if(grParam())initial='GRUPOS';
  else if(hash){
    const match=valid.find(v=>v===hash)||ORDER.find(o=>o.toUpperCase()===hash);
    if(match)initial=match;
  }
  activateTab(initial);

  // Countdown
  tickCountdown();setInterval(tickCountdown,1000);

  authBoot();
  trackVisit();
}
build();
</script>
</body>
</html>
