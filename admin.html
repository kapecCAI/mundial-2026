<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Prode Mundial 2026</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;background:#0b1220;color:#e2e8f0;}
header{background:linear-gradient(135deg,#0f172a,#1e293b);padding:18px 20px;text-align:center;border-bottom:2px solid #334155;}
header h1{margin:0;font-size:20px;color:#fbbf24;letter-spacing:.5px;}
header p{margin:4px 0 0;color:#94a3b8;font-size:12px;}
.wrap{max-width:1080px;margin:0 auto;padding:24px 16px 60px;}
.login{max-width:380px;margin:60px auto;background:#1e293b;border:1px solid #334155;border-radius:14px;padding:28px;text-align:center;}
.login h2{margin:0 0 18px;color:#fbbf24;font-size:18px;}
.login input{width:100%;padding:11px 14px;font-size:15px;border-radius:9px;border:1px solid #475569;background:#0f172a;color:#fff;margin-bottom:12px;font-family:inherit;}
.btn{background:#fbbf24;color:#0f172a;border:none;border-radius:9px;padding:11px 24px;font-weight:800;cursor:pointer;font-size:14px;width:100%;}
.btn:hover{background:#fde68a;}
.btn.alt{background:#475569;color:#fff;}
.err{color:#f87171;font-size:13px;margin-top:8px;min-height:18px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px;}
.kpi{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:18px;}
.kpi .l{color:#94a3b8;font-size:12px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;}
.kpi .v{font-size:34px;font-weight:900;color:#fbbf24;margin-top:6px;}
.kpi .s{color:#94a3b8;font-size:12px;margin-top:4px;}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:18px;margin-bottom:14px;}
.card h3{margin:0 0 12px;font-size:16px;color:#fbbf24;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{padding:8px 10px;border-bottom:1px solid #334155;text-align:left;}
th{color:#94a3b8;font-size:11px;text-transform:uppercase;}
.bar{display:flex;align-items:flex-end;gap:6px;height:120px;margin-top:8px;}
.bar .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar .b{width:100%;background:linear-gradient(180deg,#fbbf24,#b45309);border-radius:4px 4px 0 0;min-height:2px;}
.bar .l{font-size:10px;color:#94a3b8;}
.bar .n{font-size:11px;color:#fff;font-weight:700;}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.toolbar .who{color:#94a3b8;font-size:13px;}
.toolbar .btn{width:auto;}
.note{text-align:center;color:#64748b;font-size:11px;margin-top:30px;}
.note a{color:#fbbf24;text-decoration:none;}
.user-tools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.user-tools input{padding:9px 11px;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#fff;font-family:inherit;font-size:13px;}
.user-tools .btn{width:auto;padding:9px 14px;}
.result-tools{display:grid;grid-template-columns:120px 1fr 76px 1fr 76px 110px auto;gap:8px;align-items:center;margin-bottom:12px;}
.result-tools input,.result-tools select{padding:9px 11px;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#fff;font-family:inherit;font-size:13px;min-width:0;}
.result-tools .btn{width:auto;padding:9px 14px;}
.mini-btn{background:#475569;color:#fff;border:none;border-radius:8px;padding:7px 10px;font-weight:800;cursor:pointer;font-size:12px;}
.mini-btn.warn{background:#fbbf24;color:#0f172a;}
.mini-btn.del{background:#991b1b;color:#fff;}
@media(max-width:760px){.result-tools{grid-template-columns:1fr 1fr}.result-tools .btn{grid-column:1/-1}}
</style>
</head>
<body>
<header>
<h1>⚙️ Admin · Prode Mundial 2026</h1>
<p>Vista privada de métricas</p>
</header>
<div class="wrap">

<div id="login-view" class="login">
<h2>🔒 Acceso restringido</h2>
<input type="password" id="pass" placeholder="Contraseña de admin" autofocus>
<button class="btn" id="login-btn">Entrar</button>
<div class="err" id="login-err"></div>
</div>

<div id="dash" style="display:none">
<div class="toolbar">
<span class="who">🟢 Sesión admin</span>
<button class="btn alt" id="reload">↻ Actualizar</button>
</div>

<div class="grid" id="kpis"></div>

<div class="card">
<h3>📈 Visitas últimos 7 días</h3>
<div class="bar" id="bar"></div>
</div>

<div class="card">
<h3>👥 Grupos recientes</h3>
<div id="grupos"></div>
</div>

<div class="card">
<h3>🔐 Usuarios y contraseñas</h3>
<div class="user-tools">
  <input id="user-q" placeholder="Buscar usuario">
  <button class="btn alt" id="user-search">Buscar</button>
</div>
<div id="usuarios"><p style="color:#94a3b8;font-size:13px">Buscá un usuario para resetearle la contraseña.</p></div>
</div>

<div class="card">
<h3>Resultados manuales</h3>
<div class="result-tools">
  <input id="res-date" type="date">
  <input id="res-home" placeholder="Local en ingles, ej: France">
  <input id="res-hs" type="number" min="0" placeholder="GL">
  <input id="res-away" placeholder="Visitante en ingles, ej: Senegal">
  <input id="res-as" type="number" min="0" placeholder="GV">
  <select id="res-group">
    <option value="">Grupo</option>
    <option>Grupo A</option><option>Grupo B</option><option>Grupo C</option><option>Grupo D</option>
    <option>Grupo E</option><option>Grupo F</option><option>Grupo G</option><option>Grupo H</option>
    <option>Grupo I</option><option>Grupo J</option><option>Grupo K</option><option>Grupo L</option>
  </select>
  <select id="res-winner" title="Solo si fue empate y se definió por penales"><option value="">Pasó (si penales)</option></select>
  <button class="btn alt" id="res-save">Guardar</button>
</div>
<div id="resultados"><p style="color:#94a3b8;font-size:13px">Cargando resultados manuales...</p></div>
</div>
</div>

<div class="note">← <a href="/">Volver al sitio público</a></div>
</div>
<script>
let PASS_=null;
function $(id){return document.getElementById(id);}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
async function login(){
  const p=$('pass').value.trim();if(!p)return;
  try{
    const r=await fetch('/api/admin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pass:p})});
    if(!r.ok){const j=await r.json().catch(()=>({}));$('login-err').textContent=(j.error==='pass_invalida')?'Contraseña incorrecta.':('Error: '+(j.error||r.status));return;}
    PASS_=p;sessionStorage.setItem('admin_pass',p);
    $('login-view').style.display='none';$('dash').style.display='block';
    const j=await r.json();render(j);loadResults();
  }catch(e){$('login-err').textContent='No se pudo conectar.';}
}
async function reload(){
  if(!PASS_){PASS_=sessionStorage.getItem('admin_pass');if(!PASS_)return;}
  try{const r=await fetch('/api/admin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pass:PASS_})});if(r.ok){render(await r.json());loadResults();}}catch(e){}
}
async function searchUsers(){
  if(!PASS_){PASS_=sessionStorage.getItem('admin_pass');if(!PASS_)return;}
  const q=$('user-q').value.trim();
  $('usuarios').innerHTML='<p style="color:#94a3b8;font-size:13px">Buscando...</p>';
  try{
    const r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'admin_search',pass:PASS_,q:q})});
    const j=await r.json();if(!r.ok)throw j;
    renderUsers(j.users||[]);
  }catch(e){$('usuarios').innerHTML='<p style="color:#f87171;font-size:13px">No se pudo buscar usuarios.</p>';}
}
async function resetUser(username){
  const p=prompt('Nueva contraseña para '+username+':');
  if(p===null)return;
  if((p||'').length<4){alert('Mínimo 4 caracteres');return;}
  try{
    const r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'admin_reset',pass:PASS_,username:username,newPassword:p})});
    const j=await r.json();if(!r.ok)throw j;
    alert('Contraseña actualizada para '+username);
    searchUsers();
  }catch(e){alert('No se pudo resetear: '+((e&&e.error)||'error'));}
}
function renderUsers(users){
  $('usuarios').innerHTML=users.length?('<table><tr><th>Usuario</th><th>Creado</th><th>Último login</th><th>Acción</th></tr>'+users.map(u=>`<tr><td><b>${esc(u.username)}</b></td><td>${u.created?new Date(u.created).toLocaleString('es-AR'):'—'}</td><td>${u.last_login?new Date(u.last_login).toLocaleString('es-AR'):'—'}</td><td><button class="mini-btn warn" data-reset="${esc(u.username)}">Resetear clave</button></td></tr>`).join('')+'</table>'):'<p style="color:#94a3b8;font-size:13px">No encontré usuarios.</p>';
  document.querySelectorAll('[data-reset]').forEach(b=>b.onclick=()=>resetUser(b.dataset.reset));
}
function resultKey(home,away){return String(home||'').trim().toLowerCase()+'|'+String(away||'').trim().toLowerCase();}
async function loadResults(){
  const box=$('resultados');if(!box)return;
  box.innerHTML='<p style="color:#94a3b8;font-size:13px">Cargando...</p>';
  try{
    const r=await fetch('/api/results',{cache:'no-store'});
    const j=await r.json();if(!r.ok)throw j;
    renderResults(j.events||[],j.setupRequired);
  }catch(e){box.innerHTML='<p style="color:#f87171;font-size:13px">No se pudieron cargar resultados.</p>';}
}
function renderResults(events,setupRequired){
  const box=$('resultados');if(!box)return;
  if(setupRequired){box.innerHTML='<p style="color:#fbbf24;font-size:13px">Falta crear la tabla resultados_manual en Supabase. Mientras tanto la app usa los resultados confirmados del codigo.</p>';return;}
  box.innerHTML=events.length?('<table><tr><th>Fecha</th><th>Partido</th><th>Resultado</th><th>Grupo</th><th>Acción</th></tr>'+events.map(e=>`<tr><td>${esc(e.dateEvent)}</td><td>${esc(e.strHomeTeam)} vs ${esc(e.strAwayTeam)}</td><td><b>${esc(e.intHomeScore)}-${esc(e.intAwayScore)}</b>${e.strWinner?` <span style="color:#fbbf24">(pen: ${esc(e.strWinner)})</span>`:''}</td><td>${esc(e.strGroup||'')}</td><td><button class="mini-btn del" data-del-result="${esc(resultKey(e.strHomeTeam,e.strAwayTeam))}">Borrar</button></td></tr>`).join('')+'</table>'):'<p style="color:#94a3b8;font-size:13px">Todavía no hay resultados manuales.</p>';
  document.querySelectorAll('[data-del-result]').forEach(b=>b.onclick=()=>deleteResult(b.dataset.delResult));
}
function refreshWinnerOpts(){
  const h=$('res-home').value.trim(),a=$('res-away').value.trim(),sel=$('res-winner'),cur=sel.value;
  sel.innerHTML='<option value="">Pasó (si penales)</option>'+[h,a].filter(Boolean).map(t=>`<option value="${esc(t)}">Pasó: ${esc(t)}</option>`).join('');
  if(cur===h||cur===a)sel.value=cur;
}
async function saveResult(){
  if(!PASS_){PASS_=sessionStorage.getItem('admin_pass');if(!PASS_)return;}
  const body={pass:PASS_,dateEvent:$('res-date').value,strHomeTeam:$('res-home').value,intHomeScore:$('res-hs').value,strAwayTeam:$('res-away').value,intAwayScore:$('res-as').value,strGroup:$('res-group').value,winner:$('res-winner').value,strStatus:'FT'};
  if(body.winner&&body.winner!==body.strHomeTeam.trim()&&body.winner!==body.strAwayTeam.trim()){alert('El que pasó por penales debe ser uno de los dos equipos.');return;}
  try{
    const r=await fetch('/api/results',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const j=await r.json();if(!r.ok)throw j;
    $('res-home').value='';$('res-away').value='';$('res-hs').value='';$('res-as').value='';refreshWinnerOpts();
    loadResults();
  }catch(e){alert('No se pudo guardar: '+((e&&e.error)||'error'));}
}
async function deleteResult(matchKey){
  if(!confirm('¿Borrar este resultado manual?'))return;
  try{
    const r=await fetch('/api/results',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'delete',pass:PASS_,matchKey:matchKey})});
    const j=await r.json();if(!r.ok)throw j;
    loadResults();
  }catch(e){alert('No se pudo borrar: '+((e&&e.error)||'error'));}
}
function render(j){
  const s=j.stats||{};
  $('kpis').innerHTML=[
    ['Visitas totales',s.visitasTotales,'únicas (hash IP/día)'],
    ['Visitas hoy',s.visitasHoy,'únicas en el día'],
    ['Visitas 7 días',s.visitas7d,'últimos 7 días'],
    ['Prodes guardados',s.prodes,'personas que armaron su prode'],
    ['Grupos creados',s.grupos,'grupos activos'],
  ].map(k=>`<div class="kpi"><div class="l">${k[0]}</div><div class="v">${k[1]??0}</div><div class="s">${k[2]}</div></div>`).join('');
  const max=Math.max(1,...((j.serie||[]).map(x=>x.n)));
  $('bar').innerHTML=(j.serie||[]).map(x=>`<div class="col"><span class="n">${x.n}</span><div class="b" style="height:${(x.n/max)*100}%"></div><span class="l">${x.dia.slice(5)}</span></div>`).join('');
  const g=j.recientes||[];
  $('grupos').innerHTML=g.length?('<table><tr><th>Código</th><th>Nombre</th><th>Participantes</th><th>Creado</th></tr>'+g.map(x=>`<tr><td><b>${x.id}</b></td><td>${x.name||''}</td><td>${x.entries}</td><td>${x.created?new Date(x.created).toLocaleString('es-AR'):'—'}</td></tr>`).join('')+'</table>'):'<p style="color:#94a3b8;font-size:13px">Todavía no hay grupos creados.</p>';
}
$('login-btn').onclick=login;
$('pass').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
$('reload').onclick=reload;
$('user-search').onclick=searchUsers;
$('user-q').addEventListener('keydown',e=>{if(e.key==='Enter')searchUsers();});
$('res-save').onclick=saveResult;
$('res-home').addEventListener('input',refreshWinnerOpts);
$('res-away').addEventListener('input',refreshWinnerOpts);
const saved=sessionStorage.getItem('admin_pass');
if(saved){PASS_=saved;fetch('/api/admin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pass:saved})}).then(r=>r.ok?r.json():null).then(j=>{if(j){$('login-view').style.display='none';$('dash').style.display='block';render(j);loadResults();}});}
</script>
</body>
</html>
